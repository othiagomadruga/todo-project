services:
  - type: web
    name: todo-api
    env: node
    rootDir: api
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "3001"
